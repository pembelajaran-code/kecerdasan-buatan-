<!DOCTYPE html>
<html lang="id">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9278385714067409"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="google-adsense-account" content="ca-pub-9278385714067409">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AbidinAI V5.0.3</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script>

    if (localStorage.getItem("intro_done") === "true") {
        window.location.href = "private/index.html";
    }    
</script>
<style>
    body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: "Orbitron", sans-serif;
    }

    .core-glow {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center,
            rgba(0,255,255,0.25) 0%,
            rgba(0,90,90,0.15) 40%,
            transparent 70%);
        z-index: -3;
        animation: glowPulse 6s infinite ease-in-out;
    }

    @keyframes glowPulse {
        0% { opacity: 0.4; }
        50% { opacity: 0.9; }
        100% { opacity: 0.4; }
    }

    .grid {
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(0,255,255,0.10) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,255,255,0.10) 1px, transparent 1px);
        background-size: 70px 70px;
        animation: gridMove 18s linear infinite;
        z-index: -2;
    }

    @keyframes gridMove {
        from { transform: translateY(0); }
        to { transform: translateY(70px); }
    }
  
    .particles {
        position: fixed;
        inset: 0;
        background-image: radial-gradient(circle, rgba(0,255,255,0.5) 2px, transparent 2px);
        background-size: 4px 4px;
        opacity: 0.25;
        animation: particleDrift 35s linear infinite;
        z-index: -1;
    }

    @keyframes particleDrift {
        from { transform: translate(0,0); }
        to { transform: translate(80px,120px); }
    }
    
    .scanner {
        position: fixed;
        width: 100%;
        height: 3px;
        top: -10%;
        background: rgba(0,255,255,0.45);
        box-shadow: 0 0 22px cyan;
        animation: scan 4.5s linear infinite;
        z-index: 0;
    }

    @keyframes scan {
        0% { top: -10%; }
        100% { top: 110%; }
    }

    .circle-layer {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 420px;
        height: 420px;
        transform: translate(-50%, -50%);
        border: 2px solid rgba(0,255,255,0.25);
        border-radius: 50%;
        animation: rotate1 9s linear infinite;
        filter: drop-shadow(0 0 15px cyan);
    }

    .circle-layer::before {
        content: "";
        position: absolute;
        inset: 25px;
        border: 2px dashed rgba(0,255,255,0.3);
        border-radius: 50%;
        animation: rotate2 11s linear infinite reverse;
    }

    .circle-layer::after {
        content: "";
        position: absolute;
        inset: 55px;
        border: 2px dotted rgba(0,255,255,0.25);
        border-radius: 50%;
        animation: rotate3 14s linear infinite;
    }

    @keyframes rotate1 { to { transform: translate(-50%, -50%) rotate(360deg); } }
    @keyframes rotate2 { to { transform: rotate(360deg); } }
    @keyframes rotate3 { to { transform: rotate(-360deg); } }

    #intro {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        z-index: 5;
        padding: 0 20px;
    }

    .intro-title {
        font-size: 56px;
        font-weight: 900;
        color: cyan;
        text-shadow: 0 0 20px cyan, 0 0 40px #00aaff;
        animation: glowTitle 2.2s infinite alternate;
        letter-spacing: 3px;
        line-height: 1.2;
    }

    .version-tag {
        font-size: 24px;
        color: #fff;
        background: rgba(0, 255, 255, 0.2);
        padding: 4px 12px;
        border-radius: 5px;
        border: 1px solid cyan;
        display: inline-block;
        margin-top: 10px;
        text-shadow: 0 0 10px cyan;
    }

    @keyframes glowTitle {
        from { opacity: 0.5; transform: scale(0.96); }
        to   { opacity: 1; transform: scale(1.03); }
    }

    .intro-sub {
        margin-top: 25px;
        font-size: 18px;
        max-width: 650px;
        color: #a8faff;
        text-shadow: 0 0 12px cyan;
        opacity: 0;
        animation: introSub 2s forwards;
        animation-delay: 0.5s;
        line-height: 1.6;
        transition: opacity 0.5s ease, transform 0.5s ease;
    }

    @keyframes introSub {
        from { opacity: 0; transform: translateY(15px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    
    .tap {
        position: fixed;
        bottom: 40px;
        width: 100%;
        text-align: center;
        font-size: 22px;
        color: #5aeaff;
        animation: pulse 1.5s infinite;
        z-index: 10;
        cursor: pointer;
        letter-spacing: 2px;
    }

    @keyframes pulse {
        0% { opacity: 0.2; }
        50% { opacity: 1; }
        100% { opacity: 0.2; }
    }
    
    .sys-ready {
        font-size: 16px;
        color: #00ff88;
        margin-top: 20px;
        opacity: 0;
        transition: opacity 0.5s ease;
        text-shadow: 0 0 8px #00ff88;
    }
</style>
</head>
<body>

<div class="core-glow"></div>
<div class="grid"></div>
<div class="particles"></div>
<div class="scanner"></div>
<div class="circle-layer"></div>

<div id="intro">
    <div class="intro-title">ABIDINAI</div>
    <div class="version-tag">V5.0.3</div>
    <div class="intro-sub" id="introSub">
        Platform asisten AI yang dirancang untuk membantu berbagai kebutuhan dengan fitur canggih dan antarmuka yang interaktif. Dikembangkan oleh ABIDIN.
    </div>
    <div class="sys-ready" id="statusText">> SYSTEM READY _</div>
</div>

<div class="tap" id="tapBtn">Klik untuk memulai…</div>

<audio id="voice">
    <source src="https://profound-blue-lyasdsfltp-916ri5czya.edgeone.dev/ttsmaker-file-2025-11-30-18-47-22.mp3" type="audio/mpeg">
</audio>

<script>
const voice = document.getElementById("voice");
const tapBtn = document.getElementById("tapBtn");
const introSub = document.getElementById("introSub");
const statusText = document.getElementById("statusText");
let started = false;

function startAudio() {
    if (started) return;
    started = true;

    tapBtn.style.display = "none";

    voice.play().catch(() => setTimeout(() => voice.play(), 300));

    
    introSub.style.opacity = "0";
    introSub.style.transform = "translateY(-10px)";

    setTimeout(() => {
        introSub.innerHTML = "AbidinAI adalah asisten AI yang dirancang untuk membantu Anda menyelesaikan berbagai tugas, memberikan informasi, serta menjadi mitra berpikir yang adaptif dan mudah digunakan.";
        introSub.style.opacity = "1";
        introSub.style.transform = "translateY(0)";
    }, 500);

    setTimeout(() => {
        statusText.innerHTML = "> AbidinAI Siap Membantu Anda";
        statusText.style.opacity = "1";
    }, 2000);

    setTimeout(() => {
        localStorage.setItem("intro_done", "true");
        window.location.href = "private/index.html";
    }, 15000);
}

document.addEventListener("click", startAudio);
document.addEventListener("touchstart", startAudio);
</script>

</body>
</html>
