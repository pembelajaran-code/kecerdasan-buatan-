<!DOCTYPE html>
<html lang="id">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9278385714067409"
     crossorigin="anonymous"></script>
<meta charset="UTF-8" />
<meta name="google-adsense-account" content="ca-pub-9278385714067409">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ABIDINAI CHANNEL</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:#050816;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(0,174,255,0.12);
    animation:float 12s infinite linear;
}

.circle:nth-child(1){
    width:300px;
    height:300px;
    top:-100px;
    left:-100px;
}

.circle:nth-child(2){
    width:400px;
    height:400px;
    bottom:-150px;
    right:-150px;
    animation-duration:18s;
}

.circle:nth-child(3){
    width:180px;
    height:180px;
    bottom:100px;
    left:10%;
    animation-duration:10s;
}

@keyframes float{
    0%{
        transform:translateY(0) rotate(0deg);
    }
    100%{
        transform:translateY(-40px) rotate(360deg);
    }
}

.container{
    width:95%;
    max-width:1200px;
    z-index:2;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:40px;
    align-items:center;
}

/* Left */

.left{
    animation:fadeUp 1s ease;
}

.badge{
    display:inline-block;
    padding:10px 18px;
    border-radius:50px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    margin-bottom:25px;
    color:#74d8ff;
    font-size:14px;
}

h1{
    font-size:clamp(3rem,7vw,5rem);
    line-height:1.1;
    font-weight:800;
    margin-bottom:20px;
}

h1 span{
    color:#ffd34d;
    text-shadow:0 0 25px rgba(255,211,77,0.8);
}

.desc{
    color:#d8e6ff;
    line-height:1.8;
    margin-bottom:30px;
    font-size:1.1rem;
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    padding:15px 28px;
    border-radius:15px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
    display:flex;
    align-items:center;
    gap:10px;
}

.primary{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    box-shadow:0 10px 30px rgba(0,114,255,0.4);
}

.primary:hover{
    transform:translateY(-5px) scale(1.03);
}

.secondary{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    color:white;
    backdrop-filter:blur(10px);
}

.secondary:hover{
    background:rgba(255,255,255,0.12);
    transform:translateY(-5px);
}

/* Gaya khusus untuk tombol keluar agar kontras dan elegan */
.exit-btn {
    background: rgba(244, 63, 94, 0.1);
    border: 1px solid rgba(244, 63, 94, 0.3);
    color: #ff6b8b;
    backdrop-filter: blur(10px);
}

.exit-btn:hover {
    background: rgba(244, 63, 94, 0.25);
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(244, 63, 94, 0.2);
}

/* Right */

.right{
    position:relative;
    display:flex;
    justify-content:center;
    animation:zoomIn 1.2s ease;
}

.card{
    width:100%;
    max-width:450px;
    padding:18px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
    position:relative;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(0,174,255,0.2);
    border-radius:50%;
    filter:blur(80px);
    top:-80px;
    right:-80px;
}

.main-image{
    width:100%;
    border-radius:25px;
    display:block;
}

.qr-box{
    position:absolute;
    bottom:25px;
    right:25px;
    width:120px;
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    text-align:center;
}

.qr-box img{
    width:100%;
    border-radius:12px;
    background:white;
    padding:5px;
}

.qr-box p{
    margin-top:8px;
    font-size:12px;
}

/* Floating Particles */

.particle{
    position:absolute;
    width:5px;
    height:5px;
    background:#4fd9ff;
    border-radius:50%;
    animation:particleMove linear infinite;
}

@keyframes particleMove{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-100vh);
        opacity:1;
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes zoomIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@media(max-width:768px){

    body{
        overflow:auto;
        padding:30px 0;
    }

    .container{
        text-align:center;
    }

    .buttons{
        justify-content:center;
    }

    .qr-box{
        width:100px;
    }
}

/* Penyelarasan Wadah Iklan */
#banner-ad-container {
    width: 100%;
    max-width: 320px;
    margin: 20px auto 0 auto;
    display: flex;
    justify-content: center;
    z-index: 10;
}
</style>
</head>
<body>

<div class="bg">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="container">

    <div class="left">

        <div class="badge">
            🚀 SALURAN RESMI ABIDINAI
        </div>

        <h1>
            CHANNEL <span>ABIDINAI</span>
        </h1>

        <div class="desc">
            Bergabunglah ke saluran resmi WhatsApp ABIDINAI.
            Dapatkan update teknologi AI, tutorial Teknologi AI,
            berita terbaru, dan komunitas keren setiap hari.
        </div>

        <div class="buttons">
            <a href="https://whatsapp.com/channel/0029Vb6m13J2v1J1SKw71a1h" class="btn primary">
                📲 Gabung Sekarang
            </a>

            <a href="https://abidinai.my.id/" class="btn secondary">
                🌐 Website
            </a>

            <a href="dasboard.html" class="btn exit-btn">
               Keluar
            </a>
        </div>
        
        <div id="banner-ad-container"></div>
    </div>

    <div class="right">

        <div class="card">

            <img class="main-image"
            src="https://i.ibb.co.com/bMfc5CHN/IMG-20260512-WA0005-1.jpg"
            alt="ABIDINAI">

            <div class="qr-box">

                <img
                src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://i.ibb.co.com/bMfc5CHN/IMG-20260512-WA0005-1.jpg"
                alt="QR">

                <p>SCAN QR</p>

            </div>

        </div>

    </div>

</div>

<script>

for(let i=0;i<60;i++){

    const particle=document.createElement('div');
    particle.classList.add('particle');

    particle.style.left=Math.random()*100+'%';
    particle.style.animationDuration=
    (Math.random()*10+5)+'s';

    particle.style.opacity=Math.random();

    particle.style.width=
    particle.style.height=
    (Math.random()*4+2)+'px';

    document.body.appendChild(particle);
}


const buttons=document.querySelectorAll('.btn');

buttons.forEach(btn=>{

    btn.addEventListener('mousemove',(e)=>{

        const x=e.offsetX;
        const y=e.offsetY;

        btn.style.backgroundPosition=
        `${x}px ${y}px`;
    });

});

</script>
</body>
</html>
